<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="cube-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748B" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="cube-front" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="cube-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#97C767" />
      <stop offset="100%" stop-color="#7CB342" />
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#7CB342" />
      <stop offset="100%" stop-color="#97C767" />
    </linearGradient>
  </defs>
  <!-- Cube - top face -->
  <path d="M6 6 L22 6 L18 12 L2 12 Z" fill="url(#cube-top)" />
  <!-- Cube - right face (green) -->
  <path d="M22 6 L26 12 L26 28 L22 22 Z" fill="url(#cube-side)" />
  <!-- Cube - front face -->
  <path d="M2 12 L18 12 L22 22 L6 22 Z" fill="url(#cube-front)" />
  <!-- Rack lines on front -->
  <line x1="6" y1="14.5" x2="20" y2="20" stroke="#475569" stroke-width="0.7" opacity="0.7" />
  <line x1="6" y1="17" x2="20" y2="22.5" stroke="#475569" stroke-width="0.7" opacity="0.7" />
  <line x1="6" y1="19.5" x2="20" y2="25" stroke="#475569" stroke-width="0.7" opacity="0.7" />
  <!-- Curved arrow: bottom-left curve up to top-right -->
  <path d="M6 24 Q6 10 20 8 L26 14 L20 18 L26 24 L34 16" 
        stroke="url(#arrow-grad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
</svg>
